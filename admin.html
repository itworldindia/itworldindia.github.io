<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Review Approval</title>

<style>
body{
  font-family:system-ui,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(160,180,255,.35), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,180,210,.35), transparent 40%),
    linear-gradient(135deg,#e6efff,#f5f9ff);
  margin:0;
  padding:20px;
}

/* MAIN CARD */
.admin-box{
  max-width:480px;
  margin:auto;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(14px);
  padding:24px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,.12);
}

h2{
  margin-top:0;
  text-align:center;
}

/* INPUTS */
input,button{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:#2563eb;
  color:#fff;
  border:none;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.9;
}

button.danger{
  background:#dc2626;
}

/* REVIEW CARD */
.review-card{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-bottom:14px;
  border:1px solid #eee;
}

.review-card strong{
  font-size:15px;
}

.review-card small{
  opacity:.6;
  display:block;
  margin-bottom:6px;
}

.actions{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.actions button{
  flex:1;
  padding:8px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="admin-box">

  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <h2>Admin Login</h2>
    <input id="email" type="email" placeholder="Admin Email">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="adminPanel" style="display:none">
    <h2>Pending Reviews</h2>
    <div id="pendingReviews"></div>

    <button id="logoutBtn" class="danger">Logout</button>
  </div>

</div>

<script type="module" src="js/firebase-admin.js"></script>
</body>
</html>
